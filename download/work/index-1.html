.loading_view{

}
.loading_view .loading_box{
    display: block;
    width: 39px;
    height: 39px;
    border: 1px solid #fff;
    text-align: center;
    text-decoration: none;
    line-height: 40px;
    position:relative;
    animation:loading_rotate 2s 1s infinite forwards;
    overflow:hidden;
}
.loading_view .loading_box:before{
    content: 'S';
    font-size: 21px;
    color:#fff;
    font-family:'Lato' , sans-serif;
    animation:loading_text 2s 0s infinite forwards;
}
.loading_view .loading_box:after{
    content:' ';
    position: absolute;
    top:39px;
    left:0;
    width: 39px;
    height:39px;
    z-index:-1;
    animation:loading_bg 2s 0s infinite forwards;
}
 

@keyframes loading_bg{
    0%{ top:39px; background:rgba(255,255,255,1); }

.MENU_btn .button {
    position: relative;
    width: 44px;
    height: 44px;
    transition:0.4s;
    border-radius:50%;
    background:rgba(255,255,255,0);
}

.MENU_btn .scroll_style {
   transition:0.4s;
   background:rgba(255,255,255,1);
}


.MENU_btn .button input[type="checkbox"] {
    position: absolute;
    filter: alpha(opacity=0);
    opacity: 0;
    width: 100%;
    height: 100%;
    z-index: 2;
}

.MENU_btn .button input[type="checkbox"]:hover {
    cursor: pointer;
}

.MENU_btn .button input[type="checkbox"]:checked ~ .top,
.MENU_btn .button input[type="checkbox"]:checked ~ .bottom {
    top: 50%;
}

.MENU_btn .button input[type="checkbox"]:checked ~ .top {
    -webkit-transform: rotate(45deg);
    -moz-transform: rotate(45deg);
    -ms-transform: rotate(45deg);
    -o-transform: rotate(45deg);
    transform: rotate(45deg);
}

.MENU_btn .button input[type="checkbox"]:checked ~ .bottom {
    -webkit-transform: rotate(-45deg);
    -moz-transform: rotate(-45deg);
    -ms-transform: rotate(-45deg);
    -o-transform: rotate(-45deg);
    transform: rotate(-45deg);
}

.MENU_btn .button input[type="checkbox"]:checked ~ .middle {
    filter: alpha(opacity=0);
    opacity: 0;
}

.MENU_btn .button input[type="checkbox"]:checked ~ .circle {
    filter: alpha(opacity=100);
    opacity: 1;
}

.MENU_btn .button span {
    position: absolute;
    display: block;
    width: 18px;
    height: 2px;
    left: 13px;
    background-color: #fff;
    -webkit-transition: all 0.3s;
    -moz-transition: all 0.3s;
    -ms-transition: all 0.3s;
    -o-transition: all 0.3s;
    transition: all 0.3s;
    z-index: 1;
}

.MENU_btn .scroll_style span{
   background-color:#7d7d7d;
}
.MENU_btn .button .top {
    top: 31%;
}

.MENU_btn .button .middle {
    top: 49%;
}

.MENU_btn .button .bottom {
    top: 67%;
}

.NAV_mask ul li a:hover span.main{

.NAV_mask ul li a span.text{

    -webkit-transition: 0.3s;
    transform: translateY(-10px);

}



 
 

.NAV_mask ul li a:hover span.text{
    opacity: 1;
    transition: 0.3s;
    -webkit-transition: 0.3s;
    transform: translateY(0px);
    -webkit-transform: translateY(0px);
}


.overlay-hugeinc {
    opacity: 0;
    visibility: hidden;
    -webkit-transition: opacity 0.5s, visibility 0s 0.5s;
    transition: opacity 0.5s, visibility 0s 0.5s;
}

.overlay-hugeinc.open {
    opacity: 1;
    visibility: visible;
    -webkit-transition: opacity 0.5s;
    transition: opacity 0.5s;
    transform: translateY(0px);
    -webkit-transform: translateY(0px);
}

 

.overlay-hugeinc nav ul {
    opacity: 0.4;
    -webkit-transition: -webkit-transform 0.5s, opacity 0.5s;
    transition: transform 0.5s, opacity 0.5s;
    transform: translateY(50px);
    -webkit-transform: translateY(50px);
}

.overlay-hugeinc.open nav ul {
    transform: translateY(0px);
    -webkit-transform: translateY(0px);
    opacity: 1;

}

.overlay-hugeinc.close nav ul {
    transform: translateY(50px);
    -webkit-transform: translateY(50px);
}

    <script type="text/javascript">
    (function() {
    var wrapper = document.querySelector( 'div.wrapper' ),
        triggerBttn = document.getElementById( 'MENU_trigger' ),
        indexBtn = document.getElementById( 'open_MENU' ),
        overlay = document.querySelector( 'div.NAV_mask' ),
        transEndEventNames = {
            'WebkitTransition': 'webkitTransitionEnd',
            'MozTransition': 'transitionend',
            'OTransition': 'oTransitionEnd',
            'msTransition': 'MSTransitionEnd',
            'transition': 'transitionend'
        },
        transEndEventName = transEndEventNames[ Modernizr.prefixed( 'transition' ) ],
        support = { transitions : Modernizr.csstransitions };

    function toggleOverlay() {
        if( classie.has( overlay, 'open' ) ) {
            classie.remove( overlay, 'open' );
            classie.remove( wrapper, 'overlay-open' );
            classie.add( overlay, 'close' );
            var onEndTransitionFn = function( ev ) {
                if( support.transitions ) {
                    if( ev.propertyName !== 'visibility' ) return;
                    this.removeEventListener( transEndEventName, onEndTransitionFn );
                }
                classie.remove( overlay, 'close' );
            };
            if( support.transitions ) {
                overlay.addEventListener( transEndEventName, onEndTransitionFn );
            }
            else {
                onEndTransitionFn();
            }
        }
        else if( !classie.has( overlay, 'close' ) ) {
            classie.add( overlay, 'open' );
            classie.add( wrapper, 'overlay-open' );
        }
    }
    function check() {
    document.getElementById("NAV_input").checked = true;
}
    triggerBttn.addEventListener( 'click', toggleOverlay );
    indexBtn.addEventListener( 'click', toggleOverlay );
    indexBtn.addEventListener( 'click', check );
})();
